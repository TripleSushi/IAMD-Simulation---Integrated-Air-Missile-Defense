<!-- p5.js loaded via CDN — no npm, no build tools required -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.4/p5.min.js"></script>

<script>
// =============================================================================
// IAMD SIMULATION — Phase 1 Starter
// View: 2D Side View (Range × Altitude range-height display)
// Threats: Ballistic, Cruise, Hypersonic Glide, Drone Swarm
// Guidance: Proportional Navigation  →  a_m = N · V_c · (dθ/dt)
// Tracking: Simplified 2D Kalman Filter on noisy radar returns
// Author: [Your Name]  |  github.com/[username]
// =============================================================================

// ── ALL TUNABLE PARAMETERS LIVE HERE — never scatter magic numbers ────────────
const CFG = {
  // Canvas layout
  W: 1100, H: 600,        // total canvas (px)
  SIM_W: 840, SIM_H: 560, // simulation viewport
  // World scale: sim area represents 500 km range × 80 km altitude
  RANGE_KM: 500, ALT_KM: 80,

  // Physics
  GRAVITY_PX: 0.009,      // px/frame²  (scaled from 9.81 m/s² for gameplay)

  // Radar — detection probability model:
  // P_detect = 1 / (1 + (R/R_max)^4) × (σ/σ_nom)
  RADAR_RANGE_PX: 290,    // maximum detection range in sim-pixels
  RADAR_SIGMA_NOM: 1.0,   // reference RCS value (m²) for probability calc
  KALMAN_Q: 0.03,         // process noise covariance (model uncertainty)
  KALMAN_R: 9.0,          // measurement noise covariance (radar error)

  // Interceptors — Proportional Navigation constants
  PN_N: 4,                // navigation constant (3–5 typical; 4 = standard military)
  INT_SPEED: 7.5,         // px/frame (≈ Mach 4–5 scaled)
  INT_MAX_ACCEL: 1.3,     // px/frame² maneuver limit
  KILL_RADIUS: 16,        // px proximity fuze radius (≈ 400 m scaled)

  // Threat speeds (px/frame — faster = harder to intercept)
  SPD_BALLISTIC:  3.2,    // Mach ~3 (terminal descent leg)
  SPD_CRUISE:     1.8,    // Mach ~0.9 subsonic
  SPD_HYPERSONIC: 6.8,    // Mach ~10 HGV — very hard to kill
  SPD_DRONE:      1.3,    // slow UAS swarm

  // Boids parameters for drone swarm AI
  BOID_SEP: 22,           // separation radius: drones repel within this range
  BOID_ALIGN: 50,         // alignment radius: match flock velocity
  BOID_COH: 60,           // cohesion radius: move toward group centroid

  // Game pacing
  WAVE_MS: 9000,          // ms between automatic threat waves
  MAX_LEAKAGE: 5,         // leakage hits before game over

  // Interceptor battery position (right side, protected zone)
  BATT_X_FRAC: 0.87,

  // EW Radar — elevated early-warning radar (longer range, full 360°)
  EW_RADAR_RANGE_PX: 420, // extended detection range for early warning
};

// ── WORLD ↔ CANVAS COORDINATE TRANSFORMS ─────────────────────────────────────
const scX = () => CFG.SIM_W / CFG.RANGE_KM;
const scY = () => CFG.SIM_H / CFG.ALT_KM;

// ── SIMPLIFIED DECOUPLED KALMAN FILTER ───────────────────────────────────────
class KF1D {
  constructor(initPos) {
    this.pos = initPos;
    this.vel = 0;
    this.Pp = 100;
    this.Pv = 10;
    this.Pxv = 0;
  }
  predict() {
    this.pos += this.vel;
    const q = CFG.KALMAN_Q;
    const newPp  = this.Pp + 2 * this.Pxv + this.Pv + q;
    const newPxv = this.Pxv + this.Pv;
    const newPv  = this.Pv + q;
    this.Pp = newPp; this.Pxv = newPxv; this.Pv = newPv;
  }
  update(meas) {
    const inn = meas - this.pos;
    const S = this.Pp + CFG.KALMAN_R;
    const Kp  = this.Pp  / S;
    const Kv  = this.Pxv / S;
    this.pos += Kp * inn;
    this.vel += Kv * inn;
    this.Pp  -= Kp * this.Pp;
    this.Pxv -= Kp * this.Pxv;
    this.Pv  -= Kv * this.Pxv;
  }
}

class KalmanTrack {
  constructor(x, y) { this.kx = new KF1D(x); this.ky = new KF1D(y); }
  predict()        { this.kx.predict(); this.ky.predict(); }
  update(x, y)     { this.kx.update(x); this.ky.update(y); }
  get pos()        { return { x: this.kx.pos, y: this.ky.pos }; }
  get vel()        { return { x: this.kx.vel, y: this.ky.vel }; }
}

// ── RADAR STATION ─────────────────────────────────────────────────────────────
class Radar {
  constructor(fracX, id) {
    this.x    = fracX * CFG.SIM_W;
    this.y    = CFG.SIM_H;
    this.id   = id;
    this.rng  = CFG.RADAR_RANGE_PX;
    this.tracks = new Map();
    this.sweep  = random(TWO_PI);
    this.blips  = [];  // v2.0-B: detection blip flash storage
  }

  detectProb(t) {
    const dx = t.x - this.x, dy = t.y - this.y;
    const R  = sqrt(dx*dx + dy*dy);
    if (R > this.rng) return 0;
    const rangeFactor = 1 / (1 + pow(R / this.rng, 4));
    const rcsFactor   = t.rcs / CFG.RADAR_SIGMA_NOM;
    return rangeFactor * rcsFactor;
  }

  update(threats) {
    this.sweep += 0.04; // v2.0-B: faster sweep for visible rotation effect (was 0.02)
    for (const t of threats) {
      if (!t.alive) { this.tracks.delete(t.id); continue; }
      const p = this.detectProb(t);
      if (random() < p) {
        const mx = t.x + randomGaussian(0, 4);
        const my = t.y + randomGaussian(0, 4);
        if (!this.tracks.has(t.id)) {
          this.tracks.set(t.id, new KalmanTrack(mx, my));
        } else {
          const kf = this.tracks.get(t.id);
          kf.predict();
          kf.update(mx, my);
        }
      }
    }
  }

  // v2.0-B: Rotating radar sweep line with afterglow and detection blips
  draw() {
    push();
    // Static range arc boundary (dim)
    noFill();
    stroke(0, 200, 55, 25);
    strokeWeight(1);
    arc(this.x, this.y, this.rng * 2, this.rng * 2, -PI, 0);

    // Rotating sweep line
    const sweepAngle = -PI + (this.sweep % PI); // rotate within upper hemisphere (-PI to 0)
    // Sweep line with gradient (bright at base, fades at tip)
    for (let r = 0; r < this.rng; r += 3) {
      const alpha = map(r, 0, this.rng, 120, 0);
      stroke(0, 255, 65, alpha);
      strokeWeight(1.5);
      const px = this.x + cos(sweepAngle) * r;
      const py = this.y + sin(sweepAngle) * r;
      point(px, py);
    }

    // Afterglow arc behind sweep (30-degree trailing fade)
    const trailArc = PI / 6; // 30 degrees
    for (let a = 0; a < trailArc; a += 0.02) {
      const trailAngle = sweepAngle - a; // behind the sweep
      // Only draw in upper hemisphere
      if (trailAngle < -PI || trailAngle > 0) continue;
      const alpha = map(a, 0, trailArc, 30, 0);
      stroke(0, 255, 65, alpha);
      strokeWeight(1);
      for (let r = 20; r < this.rng; r += 8) {
        const rAlpha = map(r, 20, this.rng, alpha, 0);
        stroke(0, 255, 65, rAlpha);
        const px = this.x + cos(trailAngle) * r;
        const py = this.y + sin(trailAngle) * r;
        point(px, py);
      }
    }

    // Update and draw detection blips
    if (!this.blips) this.blips = [];
    // Check if sweep passes near any tracked threats
    for (const [id, kf] of this.tracks) {
      const dx = kf.pos.x - this.x;
      const dy = kf.pos.y - this.y;
      if (dy > 0) continue; // only upper hemisphere
      const threatAngle = atan2(dy, dx);
      let angleDiff = abs(sweepAngle - threatAngle);
      if (angleDiff > PI) angleDiff = TWO_PI - angleDiff;
      if (angleDiff < 0.08) { // ~5 degrees
        // Check if blip already exists for this track
        if (!this.blips.find(b => b.id === id)) {
          this.blips.push({ x: kf.pos.x, y: kf.pos.y, life: 6, id: id });
        }
      }
    }
    // Draw and age blips
    this.blips = this.blips.filter(b => {
      b.life--;
      noStroke();
      fill(0, 255, 65, map(b.life, 0, 6, 40, 200));
      ellipse(b.x, b.y, 6, 6);
      return b.life > 0;
    });

    // Radar site marker: upward-pointing triangle
    fill(0, 255, 65);
    noStroke();
    triangle(this.x - 7, this.y + 2, this.x + 7, this.y + 2, this.x, this.y - 14);

    // Station label
    fill(0, 180, 50);
    noStroke();
    textSize(8);
    textAlign(CENTER);
    text(`RDR-${this.id + 1}`, this.x, this.y + 16);
    pop();
  }
}

// ── EW RADAR (Early Warning) — Elevated, longer range, 360° coverage ─────────
// v2.0-B: Orange-tinted rotating sweep with slower rotation for long-range search
class EWRadar {
  constructor(fracX, fracY) {
    this.x    = fracX * CFG.SIM_W;
    this.y    = fracY * CFG.SIM_H;  // elevated position (not ground-level)
    this.rng  = CFG.EW_RADAR_RANGE_PX;
    this.tracks = new Map();
    this.sweep  = random(TWO_PI);
    this.blips  = [];
  }

  detectProb(t) {
    const dx = t.x - this.x, dy = t.y - this.y;
    const R  = sqrt(dx*dx + dy*dy);
    if (R > this.rng) return 0;
    const rangeFactor = 1 / (1 + pow(R / this.rng, 4));
    const rcsFactor   = t.rcs / CFG.RADAR_SIGMA_NOM;
    return rangeFactor * rcsFactor * 0.7; // slightly lower Pd than ground radars (long range trade-off)
  }

  update(threats) {
    this.sweep += 0.015; // slower rotation — correct for longer-range radar
    for (const t of threats) {
      if (!t.alive) { this.tracks.delete(t.id); continue; }
      const p = this.detectProb(t);
      if (random() < p) {
        const mx = t.x + randomGaussian(0, 6); // slightly noisier at long range
        const my = t.y + randomGaussian(0, 6);
        if (!this.tracks.has(t.id)) {
          this.tracks.set(t.id, new KalmanTrack(mx, my));
        } else {
          const kf = this.tracks.get(t.id);
          kf.predict();
          kf.update(mx, my);
        }
      }
    }
  }

  // v2.0-B: Orange-tinted 360° rotating sweep with afterglow and detection blips
  draw() {
    push();
    // Static range boundary (dim orange)
    noFill();
    stroke(255, 140, 20, 20);
    strokeWeight(1);
    ellipse(this.x, this.y, this.rng * 2, this.rng * 2);

    // Rotating sweep line — full 360 degrees (elevated radar sees all around)
    const sweepAngle = this.sweep % TWO_PI;
    for (let r = 0; r < this.rng; r += 4) {
      const alpha = map(r, 0, this.rng, 90, 0);
      stroke(255, 160, 30, alpha);
      strokeWeight(1.5);
      const px = this.x + cos(sweepAngle) * r;
      const py = this.y + sin(sweepAngle) * r;
      point(px, py);
    }

    // Afterglow arc (25 degrees behind)
    const trailArc = PI / 7.2;
    for (let a = 0; a < trailArc; a += 0.025) {
      const trailAngle = sweepAngle - a;
      const alpha = map(a, 0, trailArc, 22, 0);
      stroke(255, 160, 30, alpha);
      strokeWeight(1);
      for (let r = 30; r < this.rng; r += 10) {
        const rAlpha = map(r, 30, this.rng, alpha, 0);
        stroke(255, 160, 30, rAlpha);
        point(this.x + cos(trailAngle) * r, this.y + sin(trailAngle) * r);
      }
    }

    // Detection blips
    if (!this.blips) this.blips = [];
    for (const [id, kf] of this.tracks) {
      const dx = kf.pos.x - this.x;
      const dy = kf.pos.y - this.y;
      const threatAngle = atan2(dy, dx);
      let angleDiff = abs(sweepAngle - threatAngle);
      if (angleDiff > PI) angleDiff = TWO_PI - angleDiff;
      if (angleDiff < 0.08) {
        if (!this.blips.find(b => b.id === id)) {
          this.blips.push({ x: kf.pos.x, y: kf.pos.y, life: 6, id: id });
        }
      }
    }
    this.blips = this.blips.filter(b => {
      b.life--;
      noStroke();
      fill(255, 160, 30, map(b.life, 0, 6, 30, 180));
      ellipse(b.x, b.y, 5, 5);
      return b.life > 0;
    });

    // EW radar marker: diamond shape
    fill(255, 160, 30);
    noStroke();
    quad(this.x, this.y - 10, this.x + 7, this.y, this.x, this.y + 10, this.x - 7, this.y);

    // Label
    fill(255, 140, 20);
    noStroke();
    textSize(7);
    textAlign(CENTER);
    text('EW-1', this.x, this.y + 18);
    pop();
  }
}

// ── THREAT BASE CLASS ─────────────────────────────────────────────────────────
let _tid = 0;

class Threat {
  constructor(type, rcs) {
    this.id    = _tid++;
    this.type  = type;
    this.rcs   = rcs;
    this.alive = true;
    this.trail = [];
    this.x = 0; this.y = 0;
    this.vx = 0; this.vy = 0;
  }
  saveTrail() {
    this.trail.push({ x: this.x, y: this.y });
    if (this.trail.length > 45) this.trail.shift();
  }
  drawTrail(r, g, b) {
    noFill();
    beginShape();
    for (let i = 0; i < this.trail.length; i++) {
      stroke(r, g, b, map(i, 0, this.trail.length, 0, 170));
      strokeWeight(1);
      vertex(this.trail[i].x, this.trail[i].y);
    }
    endShape();
  }
  drawLabel(label, r, g, b) {
    fill(r, g, b, 190);
    noStroke();
    textSize(8);
    textAlign(LEFT);
    text(label, this.x + 9, this.y - 3);
  }
}

// ── BALLISTIC MISSILE ─────────────────────────────────────────────────────────
class BallisticMissile extends Threat {
  constructor(xOffset = 0) {
    super('BALLISTIC', 0.9);
    this.x  = -10 - xOffset;
    this.y  = CFG.SIM_H;
    this.vx = CFG.SPD_BALLISTIC;
    const peakPx = CFG.SIM_H * 0.55;
    this.vy = -sqrt(2 * CFG.GRAVITY_PX * peakPx);
  }
  update() {
    this.saveTrail();
    this.vy += CFG.GRAVITY_PX;
    this.x  += this.vx;
    this.y  += this.vy;
    if (this.y > CFG.SIM_H + 5 || this.x > CFG.SIM_W + 5) this.alive = false;
  }
  draw() {
    this.drawTrail(255, 80, 60);
    push();
    translate(this.x, this.y);
    rotate(atan2(this.vy, this.vx));
    fill(255, 80, 60);
    noStroke();
    triangle(-8, -3, -8, 3, 7, 0);
    pop();
    this.drawLabel('BSTC', 255, 110, 80);
  }
}

// ── CRUISE MISSILE ────────────────────────────────────────────────────────────
class CruiseMissile extends Threat {
  constructor(xOff = 0) {
    super('CRUISE', 0.4);
    this.x  = -10 - xOff;
    this.y  = CFG.SIM_H - random(55, 150);
    this.vx = CFG.SPD_CRUISE;
    this.vy = 0;
    this.phase = random(TWO_PI);
  }
  update() {
    this.saveTrail();
    this.phase += 0.035;
    this.y  += sin(this.phase) * 0.25;
    this.x  += this.vx;
    if (this.x > CFG.SIM_W + 5) this.alive = false;
  }
  draw() {
    this.drawTrail(255, 160, 40);
    push();
    translate(this.x, this.y);
    fill(255, 160, 40);
    noStroke();
    ellipse(0, 0, 16, 5);
    rect(-5, -6, 12, 2);
    pop();
    this.drawLabel('CRZ', 255, 190, 80);
  }
}

// ── HYPERSONIC GLIDE VEHICLE ──────────────────────────────────────────────────
class HypersonicGlide extends Threat {
  constructor() {
    super('HYPERSONIC', 0.6);
    this.x  = -10;
    this.y  = CFG.SIM_H * 0.22;
    this.vx = CFG.SPD_HYPERSONIC;
    this.vy = 0.7;
    this.wobPhase = random(TWO_PI);
    this.wobAmp   = random(0.04, 0.14);
  }
  update() {
    this.saveTrail();
    this.wobPhase += 0.09;
    this.vy += 0.005;
    this.y  += this.vy + sin(this.wobPhase) * this.wobAmp;
    this.x  += this.vx;
    if (this.x > CFG.SIM_W + 5 || this.y > CFG.SIM_H + 5) this.alive = false;
  }
  draw() {
    this.drawTrail(180, 80, 255);
    push();
    translate(this.x, this.y);
    rotate(atan2(this.vy, this.vx));
    fill(180, 80, 255);
    noStroke();
    quad(-8, 5, 9, 0, -8, -2, -11, 3);
    pop();
    this.drawLabel('HGV', 210, 120, 255);
  }
}

// ── DRONE (single unit in a swarm) ───────────────────────────────────────────
class Drone extends Threat {
  constructor(x, y) {
    super('DRONE', 0.05);
    this.x  = x; this.y = y;
    this.vx = CFG.SPD_DRONE + random(-0.3, 0.3);
    this.vy = random(-0.25, 0.25);
  }
  applyBoids(drones) {
    let sx=0, sy=0, sc=0;
    let ax=0, ay=0, ac=0;
    let cx=0, cy=0, cc=0;
    for (const o of drones) {
      if (o === this || !o.alive) continue;
      const dx = this.x-o.x, dy = this.y-o.y;
      const d  = sqrt(dx*dx+dy*dy);
      if (d < CFG.BOID_SEP && d > 0) { sx += dx/d; sy += dy/d; sc++; }
      if (d < CFG.BOID_ALIGN) { ax += o.vx; ay += o.vy; ac++; }
      if (d < CFG.BOID_COH)   { cx += o.x;  cy += o.y;  cc++; }
    }
    if (sc > 0) { this.vx += (sx/sc)*0.09; this.vy += (sy/sc)*0.09; }
    if (ac > 0) { this.vx += (ax/ac - this.vx)*0.04; this.vy += (ay/ac - this.vy)*0.04; }
    if (cc > 0) { this.vx += ((cx/cc)-this.x)*0.002; this.vy += ((cy/cc)-this.y)*0.002; }
    const spd = sqrt(this.vx*this.vx + this.vy*this.vy);
    if (spd > CFG.SPD_DRONE * 1.6) {
      this.vx = (this.vx/spd) * CFG.SPD_DRONE * 1.6;
      this.vy = (this.vy/spd) * CFG.SPD_DRONE * 1.6;
    }
  }
  update(peers) {
    this.saveTrail();
    this.vx = max(this.vx, 0.55);
    this.applyBoids(peers);
    this.x += this.vx; this.y += this.vy;
    if (this.x > CFG.SIM_W+5 || this.y<-10 || this.y>CFG.SIM_H+10) this.alive=false;
  }
  draw() {
    this.drawTrail(60, 255, 180);
    push();
    fill(60, 255, 180);
    noStroke();
    ellipse(this.x, this.y, 5, 5);
    pop();
  }
}

// ── INTERCEPTOR — PROPORTIONAL NAVIGATION GUIDANCE ────────────────────────────
class Interceptor {
  constructor(x, y, track) {
    this.x     = x; this.y = y;
    this.track = track;
    this.vx    = 0;
    this.vy    = -CFG.INT_SPEED;
    this.alive = true;
    this.prevLOS = null;
    this.trail = [];
    this.age   = 0;
  }
  update() {
    this.age++;
    this.trail.push({ x: this.x, y: this.y });
    if (this.trail.length > 28) this.trail.shift();

    const tp = this.track.pos;
    const tv = this.track.vel;

    const rx = tp.x - this.x, ry = tp.y - this.y;
    const rMag = sqrt(rx*rx + ry*ry);
    if (rMag < 0.5) return;

    const los = atan2(ry, rx);

    let losRate = 0;
    if (this.prevLOS !== null) {
      let dTheta = los - this.prevLOS;
      if (dTheta >  PI) dTheta -= TWO_PI;
      if (dTheta < -PI) dTheta += TWO_PI;
      losRate = dTheta;
    }
    this.prevLOS = los;

    const relVx = tv.x - this.vx, relVy = tv.y - this.vy;
    const losUx = rx / rMag,       losUy = ry / rMag;
    const Vc = -(relVx * losUx + relVy * losUy);

    const aMag  = CFG.PN_N * max(Vc, 0.5) * losRate;
    const aCmd  = constrain(aMag, -CFG.INT_MAX_ACCEL, CFG.INT_MAX_ACCEL);

    this.vx += aCmd * (-losUy);
    this.vy += aCmd * ( losUx);

    const spd = sqrt(this.vx*this.vx + this.vy*this.vy);
    if (spd > 0.01) {
      this.vx = (this.vx/spd) * CFG.INT_SPEED;
      this.vy = (this.vy/spd) * CFG.INT_SPEED;
    }
    this.x += this.vx; this.y += this.vy;

    if (this.x<-30||this.x>CFG.SIM_W+30||this.y<-60||this.y>CFG.SIM_H+20) this.alive=false;
  }
  draw() {
    noFill();
    for (let i=1; i<this.trail.length; i++) {
      stroke(0, 180, 255, map(i, 0, this.trail.length, 0, 210));
      strokeWeight(1);
      line(this.trail[i-1].x, this.trail[i-1].y, this.trail[i].x, this.trail[i].y);
    }
    push();
    translate(this.x, this.y);
    rotate(atan2(this.vy, this.vx));
    fill(0, 210, 255);
    noStroke();
    triangle(-5, -2.5, -5, 2.5, 8, 0);
    pop();
  }
}

// ── PARTICLE SYSTEM ───────────────────────────────────────────────────────────
class Particle {
  constructor(x, y, r, g, b) {
    this.x=x; this.y=y;
    this.vx=random(-4,4); this.vy=random(-4,4);
    this.life=1.0; this.decay=random(0.018,0.055);
    this.r=r; this.g=g; this.b=b;
    this.sz=random(2,7);
  }
  update() { this.x+=this.vx; this.y+=this.vy; this.vx*=0.91; this.vy*=0.91; this.life-=this.decay; }
  draw()   { noStroke(); fill(this.r,this.g,this.b,this.life*255); ellipse(this.x,this.y,this.sz*this.life,this.sz*this.life); }
  get dead() { return this.life <= 0; }
}

function boom(x, y, r=255, g=160, b=40, n=28) {
  for (let i=0; i<n; i++) particles.push(new Particle(x, y, r, g, b));
}

// ── GAME STATE ────────────────────────────────────────────────────────────────
let threats, interceptors, particles, radars, ewRadar;
let score, lastWave, gameOver, log;

// ── C2 — COMMAND & CONTROL (GREEDY INTERCEPTOR ASSIGNMENT) ───────────────────
function runC2() {
  // Merge tracks from all radars (ground + EW) into a single threat→KF map
  const allTracks = new Map();
  for (const r of radars) {
    for (const [id, kf] of r.tracks) {
      if (!allTracks.has(id)) allTracks.set(id, kf);
    }
  }
  // Include EW radar tracks in C2 picture
  if (ewRadar) {
    for (const [id, kf] of ewRadar.tracks) {
      if (!allTracks.has(id)) allTracks.set(id, kf);
    }
  }

  const engaged = new Set(interceptors.filter(i => i.alive).map(i => i.track));

  for (const [id, kf] of allTracks) {
    const threat = threats.find(t => t.id === id && t.alive);
    if (!threat) continue;
    if (engaged.has(kf)) continue;
    if (kf.pos.x < CFG.SIM_W * 0.25) continue;

    const lx = CFG.BATT_X_FRAC * CFG.SIM_W;
    interceptors.push(new Interceptor(lx, CFG.SIM_H - 8, kf));
    score.shots++;
    addLog(`C2 ▶ INTERCEPTOR LAUNCHED [${threat.type}]`);
  }
}

// ── WAVE GENERATOR ────────────────────────────────────────────────────────────
function spawnWave(type) {
  score.wave++;
  const types = ['ballistic','cruise','hypersonic','drone'];
  const t = type || types[floor(random(types.length))];
  addLog(`══ WAVE ${score.wave}: ${t.toUpperCase()} INBOUND ══`);

  if (t === 'ballistic') {
    const n = floor(random(1,4));
    for (let i=0; i<n; i++) threats.push(new BallisticMissile(i * 30));
  } else if (t === 'cruise') {
    const n = floor(random(1,4));
    for (let i=0; i<n; i++) {
      const c = new CruiseMissile(i * 50);
      c.y = CFG.SIM_H - random(50, 160);
      threats.push(c);
    }
  } else if (t === 'hypersonic') {
    threats.push(new HypersonicGlide());
  } else if (t === 'drone') {
    const n = floor(random(5, 11));
    const cy = random(CFG.SIM_H * 0.5, CFG.SIM_H * 0.85);
    for (let i=0; i<n; i++) threats.push(new Drone(random(-60,-5), cy+random(-25,25)));
  }
}

function addLog(msg) {
  log.unshift({ text: msg, age: 0 });
  if (log.length > 7) log.pop();
}

// ── COLLISION CHECK ───────────────────────────────────────────────────────────
function checkCollisions() {
  for (const inter of interceptors) {
    if (!inter.alive) continue;
    for (const t of threats) {
      if (!t.alive) continue;
      const dx = inter.x - t.x, dy = inter.y - t.y;
      if (sqrt(dx*dx+dy*dy) < CFG.KILL_RADIUS) {
        boom(t.x, t.y, 255, 180, 40);
        t.alive = false;
        inter.alive = false;
        score.kills++;
        addLog(`★ INTERCEPT  ${t.type}`);
        for (const r of radars) r.tracks.delete(t.id);
        if (ewRadar) ewRadar.tracks.delete(t.id);
      }
    }
  }
  for (const t of threats) {
    if (!t.alive) continue;
    if (t.x > CFG.SIM_W - 3) {
      boom(t.x, t.y, 255, 40, 40, 40);
      boom(t.x, t.y-10, 255, 100, 0, 20);
      t.alive = false;
      score.leak++;
      addLog(`⚠  LEAKAGE  ${t.type}  IMPACT`);
      if (score.leak >= CFG.MAX_LEAKAGE) gameOver = true;
    }
  }
}

// ── DRAW GRID ─────────────────────────────────────────────────────────────────
function drawGrid() {
  push(); strokeWeight(1);
  for (let km=0; km<=CFG.RANGE_KM; km+=100) {
    const x = (km/CFG.RANGE_KM) * CFG.SIM_W;
    stroke(0, 60, 18); line(x, 0, x, CFG.SIM_H);
    fill(0, 120, 45); noStroke(); textSize(8); textAlign(CENTER);
    text(`${km}`, x, CFG.SIM_H - 3);
  }
  for (let km=0; km<=CFG.ALT_KM; km+=20) {
    const y = CFG.SIM_H - (km/CFG.ALT_KM) * CFG.SIM_H;
    stroke(0, 60, 18); line(0, y, CFG.SIM_W, y);
    fill(0, 110, 40); noStroke(); textSize(8); textAlign(LEFT);
    text(`${km}km`, 3, y - 2);
  }
  fill(0, 100, 38); textSize(8); textAlign(CENTER);
  text('RANGE (km)', CFG.SIM_W * 0.45, CFG.SIM_H - 3);

  fill(255, 60, 60, 100); textSize(8); textAlign(LEFT);
  text('◀ THREAT ENTRY', 6, 12);

  fill(0, 80, 200, 18); noStroke();
  rect(CFG.SIM_W * 0.84, 0, CFG.SIM_W * 0.16, CFG.SIM_H);
  fill(0, 160, 255, 120); textSize(9); textAlign(CENTER);
  text('DEFENDED', CFG.SIM_W * 0.92, 20);
  text('ZONE', CFG.SIM_W * 0.92, 31);

  stroke(0, 200, 60, 160); strokeWeight(2);
  line(0, CFG.SIM_H, CFG.SIM_W, CFG.SIM_H);
  pop();
}

// ── DRAW KALMAN TRACK CROSSHAIRS ──────────────────────────────────────────────
function drawTracks() {
  for (const r of radars) {
    for (const [, kf] of r.tracks) {
      const { x, y } = kf.pos;
      noFill();
      stroke(0, 255, 65, 150);
      strokeWeight(1);
      line(x-7,y, x+7,y); line(x,y-7, x,y+7);
      stroke(0, 255, 65, 50);
      ellipse(x, y, 22, 22);
    }
  }
  // Also draw EW radar tracks (orange tint)
  if (ewRadar) {
    for (const [, kf] of ewRadar.tracks) {
      const { x, y } = kf.pos;
      noFill();
      stroke(255, 160, 30, 120);
      strokeWeight(1);
      line(x-6,y, x+6,y); line(x,y-6, x,y+6);
      stroke(255, 160, 30, 35);
      ellipse(x, y, 20, 20);
    }
  }
}

// ── DRAW INTERCEPTOR BATTERY SITE ────────────────────────────────────────────
function drawBattery() {
  const bx = CFG.BATT_X_FRAC * CFG.SIM_W;
  push();
  fill(0, 160, 255); noStroke();
  rect(bx - 8, CFG.SIM_H - 14, 16, 12, 2);
  stroke(0, 220, 255); strokeWeight(1.5);
  line(bx - 5, CFG.SIM_H - 14, bx - 5, CFG.SIM_H - 22);
  line(bx,     CFG.SIM_H - 14, bx,     CFG.SIM_H - 24);
  line(bx + 5, CFG.SIM_H - 14, bx + 5, CFG.SIM_H - 22);
  fill(0, 200, 255); noStroke(); textSize(8); textAlign(CENTER);
  text('SAM BATT', bx, CFG.SIM_H + 13);
  pop();
}

// ── DRAW RIGHT PANEL ──────────────────────────────────────────────────────────
function drawPanel() {
  const px = CFG.SIM_W + 12;
  const pw = CFG.W - CFG.SIM_W;
  push();
  fill(2, 10, 4); noStroke(); rect(CFG.SIM_W, 0, pw, CFG.H);
  stroke(0, 120, 40, 100); strokeWeight(1); line(CFG.SIM_W, 0, CFG.SIM_W, CFG.H);

  fill(0, 255, 65); noStroke(); textSize(11); textAlign(LEFT);
  text('◈ IAMD COMMAND', px, 22);
  fill(0, 120, 50); textSize(8);
  text('2D RANGE-HEIGHT DISPLAY', px, 33);
  stroke(0, 90, 35); line(px, 37, CFG.W-8, 37);

  let y = 52;
  const statLine = (label, val, vr=0, vg=255, vb=65) => {
    fill(0, 120, 45); textSize(9); textAlign(LEFT); text(label, px, y);
    fill(vr, vg, vb); textAlign(RIGHT); text(val, CFG.W-10, y);
    textAlign(LEFT); y += 17;
  };
  statLine('WAVE',        score.wave);
  statLine('KILLS',       score.kills, 0, 255, 100);
  const lc = score.leak > 2 ? [255,70,70] : [255,170,50];
  statLine('LEAKAGE',     `${score.leak}/${CFG.MAX_LEAKAGE}`, ...lc);
  statLine('SHOTS FIRED', score.shots, 0, 200, 255);
  const tot = score.kills + score.leak;
  const pct = tot > 0 ? floor((score.kills/tot)*100) : 100;
  statLine('KILL RATE',   `${pct}%`, pct>70 ? 0 : 255, pct>70 ? 255 : 80, pct>70 ? 65 : 80);

  y += 4; stroke(0, 80, 30); line(px, y, CFG.W-8, y); y += 13;
  fill(0, 160, 55); textSize(9); text('── SYS PARAMS ──', px, y); y += 13;
  fill(0, 110, 42); textSize(8);
  const param = (k, v) => { text(`${k} : ${v}`, px, y); y += 11; };
  param('PN constant  N', CFG.PN_N);
  param('Radar range  ', `${CFG.RADAR_RANGE_PX}px`);
  param('Kill radius  ', `${CFG.KILL_RADIUS}px`);
  param('Wave period  ', `${CFG.WAVE_MS/1000}s`);
  param('INT speed    ', `${CFG.INT_SPEED}px/f`);

  y += 4; stroke(0, 80, 30); line(px, y, CFG.W-8, y); y += 13;
  fill(0, 160, 55); textSize(9); text('── LEGEND ──', px, y); y += 13;
  const leg = [
    [[255,80,60],  '▶ Ballistic (BSTC)'],
    [[255,160,40], '▶ Cruise (CRZ)'],
    [[180,80,255], '▶ Hypersonic (HGV)'],
    [[60,255,180], '▶ Drone swarm'],
    [[0,210,255],  '◁ Interceptor (PN)'],
    [[0,255,65],   '◎ Radar + track'],
    [[255,160,30], '◇ EW Radar (early warn)'],
  ];
  for (const [c, l] of leg) {
    fill(...c); noStroke(); textSize(8); text(l, px, y); y += 11;
  }

  y += 5; stroke(0, 80, 30); line(px, y, CFG.W-8, y); y += 13;
  fill(0, 155, 55); textSize(9); text('── EVENT LOG ──', px, y); y += 12;
  for (const m of log) {
    fill(0, 200, 75, map(m.age, 0, 220, 255, 40));
    textSize(7.5); text(m.text, px, y); y += 11;
    m.age++;
  }
  log = log.filter(m => m.age < 300);

  stroke(0, 60, 25); line(px, CFG.H-38, CFG.W-8, CFG.H-38);
  fill(0, 90, 38); textSize(7.5); noStroke();
  text('[R] Restart  [+/-] Wave speed', px, CFG.H-26);
  text('[1] Ballistic  [2] Cruise', px, CFG.H-16);
  text('[3] Hypersonic  [4] Drone swarm', px, CFG.H-6);
  pop();
}

// ── GAME OVER OVERLAY ─────────────────────────────────────────────────────────
function drawGameOver() {
  fill(0, 0, 0, 190); noStroke(); rect(0, 0, CFG.SIM_W, CFG.SIM_H);
  fill(255, 50, 50); textSize(34); textAlign(CENTER, CENTER);
  text('DEFENSE FAILED', CFG.SIM_W/2, CFG.SIM_H/2 - 38);
  fill(0, 200, 255); textSize(13);
  text(`${score.leak} impacts sustained — protected zone destroyed`, CFG.SIM_W/2, CFG.SIM_H/2 + 2);
  fill(0, 255, 65); textSize(12);
  text(`Final kill rate: ${score.kills + score.leak > 0 ? floor(score.kills/(score.kills+score.leak)*100) : 100}%   Shots fired: ${score.shots}`, CFG.SIM_W/2, CFG.SIM_H/2 + 24);
  fill(0, 200, 100); textSize(12);
  text('Press [R] to restart', CFG.SIM_W/2, CFG.SIM_H/2 + 52);
  textAlign(LEFT);
}

// ── INIT ──────────────────────────────────────────────────────────────────────
function initGame() {
  _tid        = 0;
  threats     = [];
  interceptors= [];
  particles   = [];
  // Three ground radars placed at different downrange positions for overlapping coverage
  radars = [
    new Radar(0.33, 0),
    new Radar(0.58, 1),
    new Radar(0.78, 2),
  ];
  // EW Radar: elevated early-warning radar near center of defended area
  ewRadar = new EWRadar(0.52, 0.65); // positioned at ~52% range, ~35% altitude (elevated site)
  score       = { wave: 0, kills: 0, leak: 0, shots: 0 };
  log         = [];
  gameOver    = false;
  lastWave    = millis();
  addLog('SYSTEM NOMINAL — AWAITING THREATS');
  addLog('SAM BATTERY ONLINE');
  addLog('EW RADAR ONLINE — 360° COVERAGE');
}

// ── P5.JS ENTRY POINTS ────────────────────────────────────────────────────────
function setup() {
  createCanvas(CFG.W, CFG.H);
  textFont('Share Tech Mono');
  initGame();
}

function draw() {
  background(4, 10, 4);
  drawGrid();

  if (!gameOver && millis() - lastWave > CFG.WAVE_MS) {
    spawnWave();
    lastWave = millis();
  }

  const liveDrones = threats.filter(t => t.type==='DRONE' && t.alive);
  for (const t of threats) {
    if (!t.alive) continue;
    if (t.type === 'DRONE') t.update(liveDrones);
    else t.update();
  }
  threats = threats.filter(t => t.alive);

  // Radar tracking (detect + Kalman predict/update) — ground radars + EW radar
  const liveThreats = threats.filter(t => t.alive);
  for (const r of radars) r.update(liveThreats);
  if (ewRadar) ewRadar.update(liveThreats);

  if (!gameOver && frameCount % 30 === 0) runC2();

  for (const i of interceptors) if (i.alive) i.update();
  interceptors = interceptors.filter(i => i.alive);

  if (!gameOver) checkCollisions();

  for (const p of particles) { p.update(); p.draw(); }
  particles = particles.filter(p => !p.dead);

  // Draw scene elements (order: EW radar behind, then threats, interceptors, ground radars, overlays)
  if (ewRadar) ewRadar.draw();
  for (const t of threats) if (t.alive) t.draw();
  for (const i of interceptors) if (i.alive) i.draw();
  for (const r of radars) r.draw();
  drawBattery();
  drawTracks();

  drawPanel();
  if (gameOver) drawGameOver();
}

// ── KEYBOARD CONTROLS ─────────────────────────────────────────────────────────
function keyPressed() {
  if (key === 'r' || key === 'R') { initGame(); return; }
  if (key === '1') { spawnWave('ballistic'); }
  if (key === '2') { spawnWave('cruise');    }
  if (key === '3') { spawnWave('hypersonic');}
  if (key === '4') { spawnWave('drone');     }
  if (key === '=' || key === '+') CFG.WAVE_MS = max(2000, CFG.WAVE_MS - 1000);
  if (key === '-' || key === '_') CFG.WAVE_MS = min(30000, CFG.WAVE_MS + 1000);
}
